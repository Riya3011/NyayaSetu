<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NyayaSetu | Find a Lawyer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--gold:#c9992a;--gold2:#d6a93c;--light:#f5f0e8;--cream2:#ede6d8;--muted:#6b7a99;--text:#1a2540;--green:#1a7f37;--red:#d62828;--amber:#b78103;--blue:#0369a1;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--light);color:var(--text);}
nav{background:var(--navy);padding:18px 60px;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;color:white;text-decoration:none;}
.logo-icon{background:var(--gold);width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-family:'Playfair Display';color:var(--navy);}
.logo-text{font-family:'Playfair Display';font-size:20px;color:#fff;}.logo-text span{color:var(--gold2);}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold2);}
.nav-right{display:flex;align-items:center;gap:12px;}

.page-header{background:var(--navy);color:white;padding:70px 60px 50px;text-align:center;}
.page-header h1{font-family:'Playfair Display';font-size:42px;margin-bottom:10px;}
.page-header p{color:rgba(255,255,255,0.55);max-width:560px;margin:auto;}

.container{max-width:1100px;margin:auto;padding:50px 60px;}

/* Search + filter bar */
.filter-bar{display:flex;gap:14px;margin-bottom:36px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-wrap input{
  width:100%;padding:11px 14px 11px 40px;
  border:1px solid var(--cream2);border-radius:10px;
  font-size:14px;font-family:'Outfit',sans-serif;
  background:white;color:var(--text);outline:none;
  transition:border-color 0.2s;
}
.search-wrap input:focus{border-color:var(--gold);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);}
.filter-select{
  padding:11px 14px;border:1px solid var(--cream2);border-radius:10px;
  font-size:14px;font-family:'Outfit',sans-serif;
  background:white;color:var(--text);outline:none;cursor:pointer;
  transition:border-color 0.2s;
}
.filter-select:focus{border-color:var(--gold);}

/* Lawyer grid */
.lawyers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;}
.lawyer-card{
  background:white;border-radius:16px;padding:26px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border:1px solid var(--cream2);
  transition:transform 0.2s,box-shadow 0.2s;
  display:flex;flex-direction:column;gap:14px;
}
.lawyer-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.1);}
.lawyer-top{display:flex;align-items:center;gap:14px;}
.lawyer-avatar{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--navy),var(--gold));
  display:grid;place-items:center;
  font-size:20px;font-weight:700;color:white;
  font-family:'Playfair Display';flex-shrink:0;
}
.lawyer-name{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.lawyer-spec{font-size:13px;color:var(--gold);font-weight:500;}
.lawyer-meta{display:flex;flex-wrap:wrap;gap:8px;}
.meta-chip{
  font-size:12px;padding:4px 10px;border-radius:20px;
  background:#f0f4ff;color:#3730a3;font-weight:500;
}
.meta-chip.exp{background:#f0fdf4;color:#166534;}
.meta-chip.bar{background:#fef9ec;color:#92400e;}
.lawyer-email{
  font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;
}
.contact-btn{
  margin-top:auto;padding:10px;width:100%;
  background:var(--navy);color:white;border:none;
  border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;
  transition:background 0.2s;text-decoration:none;
  display:block;text-align:center;
}
.contact-btn:hover{background:var(--gold);color:var(--navy);}

/* States */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:15px;}
.loading-spinner{
  width:36px;height:36px;border:3px solid var(--cream2);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:80px 20px;}
.empty-state .emoji{font-size:48px;display:block;margin-bottom:16px;}
.empty-state h3{font-family:'Playfair Display';font-size:22px;margin-bottom:8px;}
.empty-state p{color:var(--muted);}
.error-banner{
  background:#fdecea;border:1px solid #e57373;border-radius:10px;
  padding:16px 20px;color:#c0392b;font-size:14px;margin-bottom:24px;
}

/* Count badge */
.result-count{font-size:14px;color:var(--muted);margin-bottom:20px;}
.result-count strong{color:var(--navy);}
</style>
</head>
<body>

<script src="auth.js"></script>
<script>Auth.requireAuth(["user", "lawyer", "admin"]);</script>

<nav>
  <a href="nyayasetu.html" class="logo">
    <div class="logo-icon">N</div>
    <div class="logo-text">Nyaya<span>Setu</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="nyayasetu.html">Home</a></li>
    <li><a href="awareness.html">Legal Awareness</a></li>
    <li><a href="query.html">Submit Query</a></li>
    <li><a href="document.html">Analyze Document</a></li>
    <li><a href="lawyers.html" class="active">Find a Lawyer</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  </ul>
  <div class="nav-right" id="userChip"></div>
</nav>

<div class="page-header">
  <h1>Find a Lawyer</h1>
  <p>Connect with verified legal professionals registered on NyayaSetu.</p>
</div>

<div class="container">

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name or specialization…" oninput="applyFilters()"/>
    </div>
    <select class="filter-select" id="specFilter" onchange="applyFilters()">
      <option value="">All Specializations</option>
      <option value="Criminal Law">Criminal Law</option>
      <option value="Family Law">Family Law</option>
      <option value="Property Law">Property Law</option>
      <option value="Labour Law">Labour Law</option>
      <option value="Corporate Law">Corporate Law</option>
      <option value="Consumer Law">Consumer Law</option>
      <option value="Cyber Law">Cyber Law</option>
      <option value="Civil Law">Civil Law</option>
    </select>
    <select class="filter-select" id="expFilter" onchange="applyFilters()">
      <option value="">Any Experience</option>
      <option value="1">1+ Years</option>
      <option value="5">5+ Years</option>
      <option value="10">10+ Years</option>
    </select>
  </div>

  <div id="errorBanner" style="display:none;" class="error-banner"></div>
  <div class="result-count" id="resultCount" style="display:none;"></div>
  <div id="lawyersContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      Loading lawyers…
    </div>
  </div>
</div>

<script>
Auth.renderUserChip();

const API_BASE = "http://localhost:5050/api";
let allLawyers = [];

async function loadLawyers() {
  const container = document.getElementById("lawyersContainer");
  try {
    const res  = await fetch(`${API_BASE}/lawyers`);
    const data = await res.json();

    if (!data.success) throw new Error(data.message || "Failed to load lawyers");

    allLawyers = data.lawyers || [];
    applyFilters();

  } catch (err) {
    const errEl = document.getElementById("errorBanner");
    errEl.style.display = "block";
    errEl.textContent   = "⚠️ Could not load lawyers: " + err.message + ". Is the backend running?";
    container.innerHTML = "";
  }
}

function applyFilters() {
  const search  = document.getElementById("searchInput").value.toLowerCase().trim();
  const spec    = document.getElementById("specFilter").value;
  const minExp  = parseInt(document.getElementById("expFilter").value) || 0;

  let filtered = allLawyers.filter(l => {
    const nameMatch = !search || l.name.toLowerCase().includes(search) ||
                      (l.specialization||"").toLowerCase().includes(search);
    const specMatch = !spec || (l.specialization||"").toLowerCase() === spec.toLowerCase();
    const expMatch  = !minExp || (l.experience || 0) >= minExp;
    return nameMatch && specMatch && expMatch;
  });

  renderLawyers(filtered);
}

function getInitials(name) {
  return name.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase();
}

function renderLawyers(lawyers) {
  const container  = document.getElementById("lawyersContainer");
  const countEl    = document.getElementById("resultCount");
  countEl.style.display = "block";
  countEl.innerHTML = `Showing <strong>${lawyers.length}</strong> lawyer${lawyers.length !== 1 ? "s" : ""}`;

  if (!lawyers.length) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="emoji">👨‍⚖️</span>
        <h3>No lawyers found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>`;
    return;
  }

  container.innerHTML = "";
  const grid = document.createElement("div");
  grid.className = "lawyers-grid";

  for (const l of lawyers) {
    const joined    = l.createdAt ? new Date(l.createdAt).getFullYear() : "";
    const initials  = getInitials(l.name);
    const card      = document.createElement("div");
    card.className  = "lawyer-card";
    card.innerHTML  = `
      <div class="lawyer-top">
        <div class="lawyer-avatar">${initials}</div>
        <div>
          <div class="lawyer-name">${l.name}</div>
          <div class="lawyer-spec">${l.specialization || "General Practice"}</div>
        </div>
      </div>
      <div class="lawyer-meta">
        ${l.experience ? `<span class="meta-chip exp">⚖️ ${l.experience} yr${l.experience !== 1 ? "s" : ""} exp.</span>` : ""}
        ${l.barCouncilId ? `<span class="meta-chip bar">🪪 Bar: ${l.barCouncilId}</span>` : ""}
        ${joined ? `<span class="meta-chip">📅 Since ${joined}</span>` : ""}
      </div>
      <div class="lawyer-email">📧 ${l.email}</div>
      <a class="contact-btn" href="mailto:${l.email}">Contact via Email</a>
    `;
    grid.appendChild(card);
  }

  container.appendChild(grid);
}

loadLawyers();
</script>

</body>
</html>
